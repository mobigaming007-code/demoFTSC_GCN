<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu GCN Ủng hộ - Fly To Sky</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1D4ED8; --primary-dark: #1E40AF; --primary-light: #DBEAFE; --bg-page: #EFF6FF; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: var(--bg-page); color: #1E293B; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.2rem; }
        header { text-align: center; margin-bottom: 2.5rem; }
        .logo { width: 56px; height: 56px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; margin: 0 auto 1rem; }
        .search-box { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .input-group { display: flex; gap: 0.5rem; }
        input { flex: 1; height: 48px; padding: 0 1rem; border: 2px solid #E2E8F0; border-radius: 8px; font-size: 1rem; }
        button { height: 48px; padding: 0 1.5rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.7; }
        .card { background: white; border: 1px solid #BFDBFE; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .card-header { display: flex; align-items: center; gap: 1rem; }
        .avatar { width: 44px; height: 44px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .badge { display: inline-block; background: var(--primary-light); color: var(--primary); font-size: 12px; padding: 3px 10px; border-radius: 99px; }
        .card-body { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; font-size: 0.9rem; border-top: 1px solid #F1F5F9; padding-top: 1rem; }
        .ma-gcn { font-family: monospace; color: var(--primary); font-weight: 600; }
        .amount { color: var(--primary); font-weight: 700; }
        .btn-view { display: block; text-align: center; padding: 0.6rem; border: 1px solid var(--primary); color: var(--primary); text-decoration: none; border-radius: 6px; font-weight: 600; }
        footer { background: #1E3A8A; color: white; padding: 2.5rem 1.5rem; text-align: center; margin-top: 4rem; font-size: 13px; }
        .spinner { width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 1rem auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .alert { padding: 1rem; border-radius: 8px; font-size: 0.9rem; margin-bottom: 1rem; display: none; border: 1px solid transparent; }
        .alert-error { background: #FEF2F2; color: #B91C1C; border-color: #FECACA; }
        @media (max-width: 480px) { .input-group { flex-direction: column; } .card-body { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">FTS</div>
            <h1 style="color:#1E40AF">Hệ thống Từ thiện Fly To Sky</h1>
            <div style="color:#3B82F6; font-weight:500">Tra cứu Giấy Chứng Nhận Ủng Hộ</div>
        </header>
        <div class="search-box">
            <p style="text-align:center; color:#64748B; font-size:0.9rem; margin-bottom:0.75rem">Tra cứu bằng Mã GCN, SĐT hoặc Họ và tên</p>
            <div class="input-group">
                <input type="text" id="searchInput" placeholder="Nhập từ khóa...">
                <button id="searchBtn">TRA CỨU</button>
            </div>
            <div id="loading" class="spinner"></div>
        </div>
        <div id="alertBox" class="alert alert-error"></div>
        <div id="resultsList" class="results-list"></div>
    </div>
    <footer>
        <p>Mọi thông tin chi tiết xin liên hệ:</p>
        <p style="font-size:18px; font-weight:700; margin:5px 0">HỆ THỐNG TỪ THIỆN FLY TO SKY</p>
        <hr style="opacity:0.2; margin:15px 0">
        <p>Email: lienhe@flytoskycharity.vn | Hotline: 0375.136.800</p>
        <p>© 2024 Fly To Sky Charity System.</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwzjP72xZZ6asUigNZSIygWoz7SfSmNJ2O5db4nlCgTkntQBr4m2r5DtVXGQOURXtSB/exec";
        const API_KEY = "FLY2SKY_SECRET_0209";

        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const loading = document.getElementById('loading');
            const btn = document.getElementById('searchBtn');
            const list = document.getElementById('resultsList');
            const alertBox = document.getElementById('alertBox');

            alertBox.style.display = 'none';
            list.innerHTML = '';
            loading.style.display = 'block';
            btn.disabled = true;

            try {
                // SỬ DỤNG POST + TEXT/PLAIN ĐỂ VƯỢT CORS GIỐNG FILE BẠN CUNG CẤP
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ query: query, auth: API_KEY })
                });

                const result = await response.json();
                if (!result.success) throw new Error(result.message);

                if (result.data.length === 0) throw new Error("Không tìm thấy kết quả nào.");

                result.data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header"><div class="avatar">${item.hoTen[0]}</div>
                        <div><div style="font-weight:700; color:#1E40AF">${item.hoTen}</div><div class="badge">${item.chienDich}</div></div></div>
                        <div class="card-body">
                            <div><span>Mã GCN</span><p class="ma-gcn">${item.maGCN}</p></div>
                            <div><span>Số tiền</span><p class="amount">${Number(item.soTien).toLocaleString()} VNĐ</p></div>
                        </div>
                        ${item.linkGCN ? `<a href="${item.linkGCN}" target="_blank" class="btn-view">Xem GCN ↗</a>` : ''}
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                alertBox.innerText = e.message;
                alertBox.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }
        document.getElementById('searchBtn').onclick = performSearch;
    </script>
</body>
</html>
