<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu GCN - Fly To Sky</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* CSS chuẩn như trước */
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Be Vietnam Pro', sans-serif; background:#EFF6FF; color:#1E293B; }
.container { max-width:960px; margin:0 auto; padding:2rem 1rem; }
header{text-align:center;margin-bottom:2rem;}
.logo{width:56px;height:56px;border-radius:50%;background:#1D4ED8;color:white;display:inline-flex;align-items:center;justify-content:center;font-weight:700;margin-bottom:1rem;}
h1.title{font-weight:700;color:#1E40AF;margin-bottom:0.5rem;}
h2.subtitle{font-weight:500;color:#3B82F6;font-size:18px;}
.search-box{text-align:center;margin:2rem 0;}
.search-box input{width:480px;max-width:100%;height:48px;padding:0 1rem;border:1px solid #CBD5E1;border-radius:8px;font-size:16px;}
.search-box button{margin-left:0.5rem;height:48px;padding:0 1.5rem;background:#1D4ED8;color:white;font-weight:600;border-radius:8px;transition:0.2s;}
.search-box button:hover{background:#1E40AF;}
.search-box button:disabled{opacity:0.7;cursor:not-allowed;}
.alert-error{background:#FEF2F2;border:1px solid #FECACA;color:#B91C1C;padding:0.75rem 1rem;border-radius:8px;margin:1rem auto;max-width:480px;}
.alert-warning{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;padding:0.75rem 1rem;border-radius:8px;margin:1rem auto;max-width:480px;}
.results-summary{font-size:14px;color:#6B7280;margin-bottom:1rem;text-align:center;}
.cards{display:flex;flex-direction:column;gap:1rem;}
.card{background:white;border:1px solid #BFDBFE;border-radius:12px;padding:1.25rem;transition:0.2s;}
.card:hover{border-color:#93C5FD;}
.card-header{display:flex;align-items:center;gap:1rem;margin-bottom:0.75rem;}
.avatar{width:44px;height:44px;border-radius:50%;background:#1D4ED8;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
.card-header .name{font-weight:700;font-size:18px;color:#1E40AF;}
.badge{background:#DBEAFE;color:#1D4ED8;font-size:12px;padding:3px 10px;border-radius:9999px;}
.card-detail{font-size:14px;margin:0.25rem 0;}
.card-detail .maGCN{font-family:monospace;color:#1D4ED8;font-weight:600;}
.card-detail .soTien{font-weight:700;color:#1D4ED8;}
.card-footer{margin-top:1rem;}
.card-footer button{padding:0.5rem 1rem;border:1px solid #1D4ED8;border-radius:8px;background:white;color:#1D4ED8;font-weight:600;transition:0.2s;}
.card-footer button:hover{background:#DBEAFE;}
.card-footer .no-link{background:#FEF9C3;color:#854D0E;border:none;padding:0.5rem 1rem;border-radius:8px;font-weight:600;}
footer{background:#1E3A8A;color:white;padding:2.5rem 1.5rem;text-align:center;font-size:13px;}
footer a{color:#93C5FD;}
</style>
</head>
<body>
<header>
  <div class="logo">FTS</div>
  <h1 class="title">HỆ THỐNG TỪ THIỆN FLY TO SKY</h1>
  <h2 class="subtitle">Tra cứu Giấy Chứng Nhận Ủng Hộ</h2>
</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Nhập Mã GCN, SĐT hoặc Họ và tên...">
  <button id="searchBtn">TRA CỨU</button>
</div>

<div id="alertBox"></div>
<div class="container">
  <div class="results-summary" id="resultsSummary"></div>
  <div class="cards" id="cardsContainer"></div>
</div>

<footer>
  <!-- Footer chuẩn như yêu cầu -->
  <p style="font-size:20px;font-weight:700;">HỆ THỐNG TỪ THIỆN FLY TO SKY</p>
</footer>

<script>
// --- Cấu hình
const API_URL = "https://script.google.com/macros/s/AKfycbyosnNufD3pSnp8mtoia6G6a7hlVEXwHx42GiJii9UQNxdszZsPFoc-I7haUlA35Z1I/exec";
const API_KEY = "FLY2SKY_SECRET_XXXX";

// --- DOM
const input = document.getElementById("searchInput");
const btn = document.getElementById("searchBtn");
const resultsSummary = document.getElementById("resultsSummary");
const cardsContainer = document.getElementById("cardsContainer");
const alertBox = document.getElementById("alertBox");

btn.addEventListener("click", searchGCN);
input.addEventListener("keypress", e=>{if(e.key==="Enter") searchGCN();});

// --- JSONP fetch
function searchGCN(){
  const query = input.value.trim();
  alertBox.innerHTML=""; resultsSummary.textContent=""; cardsContainer.innerHTML="";
  if(!query){alertBox.innerHTML='<div class="alert-error">Vui lòng nhập từ khóa</div>'; return;}

  const callbackName = "handleResult_"+Date.now();
  window[callbackName] = function(res){
    delete window[callbackName]; document.body.removeChild(script);
    if(!res.success){ alertBox.innerHTML=`<div class="alert-error">${res.message}</div>`; return; }
    resultsSummary.textContent=`Tìm thấy ${res.count} kết quả cho '${query}'`;
    if(res.count===0){ alertBox.innerHTML='<div class="alert-warning">Không tìm thấy kết quả</div>'; return; }
    res.data.forEach(item=>{
      const avatar = item.hoTen ? item.hoTen.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase() : "?";
      const card = document.createElement("div"); card.className="card";
      card.innerHTML = `
      <div class="card-header">
        <div class="avatar">${avatar}</div>
        <div>
          <div class="name">${item.hoTen || "—"}</div>
          <div class="badge">${item.chienDich || "—"}</div>
        </div>
      </div>
      <div class="card-detail"><span class="label">Mã GCN:</span> <span class="maGCN">${item.maGCN||"—"}</span></div>
      <div class="card-detail"><span class="label">Ngày ủng hộ:</span> ${item.ngayUngHo||"—"}</div>
      <div class="card-detail"><span class="label">Số tiền:</span> <span class="soTien">${(item.soTien||0).toLocaleString('vi-VN')} VNĐ</span></div>
      <div class="card-detail"><span class="label">SĐT:</span> ${item.sdt||"—"}</div>
      <div class="card-footer">
        ${item.linkGCN? `<button onclick="window.open('${item.linkGCN}','_blank')">Xem GCN ↗</button>` :
          `<span class="no-link">Chưa có GCN</span>`}
      </div>`;
      cardsContainer.appendChild(card);
    });
  };

  const script = document.createElement("script");
  script.src = `${API_URL}?query=${encodeURIComponent(query)}&auth=${API_KEY}&callback=${callbackName}`;
  document.body.appendChild(script);
}
</script>
</body>
</html>
